<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Rain Orchard - Home</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<nav class="header-bar" id="headerBar">
		<div class="nav-items">
			<a href="/" class="nav-item active">
				<img src="Images/Arrow.svg" alt="" class="nav-arrow" />
				home
			</a>
			<a href="/wall/" class="nav-item">
				<img src="Images/Arrow.svg" alt="" class="nav-arrow" />
				wall
			</a>
		</div>
	</nav>

	<div class="top-bar">
		<div class="brand" id="brand">
			Rain Orchard
		</div>
	</div>

	<div class="content">
		<div class="content-text" id="contentText">
		</div>
		<img id="homeImage" alt="" class="home-image" />
	</div>

	<script>
		const r = Math.random();
		let accent;
		if (r < 0.7) {
			accent = 1;
		} else if (r < 0.85) {
			accent = 2;
		} else {
			accent = 3;
		}
		document.getElementById('headerBar').style.background = 'var(--accent-' + accent + ')';
		document.getElementById('homeImage').src = 'Images/image-accent-' + accent + '.png';
	</script>
</body>
</html>
